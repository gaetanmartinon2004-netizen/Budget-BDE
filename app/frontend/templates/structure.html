<!-- Vue Structure - Gestion de l'arborescence -->
<div id="structure-view" class="view structure-view">
    <div class="view-header">
        <h2>🗂️ Structure - Gestion des Catégories</h2>
        <div class="structure-actions">
            <button id="structure-expand-all" class="btn btn-secondary">Tout dérouler</button>
            <button id="structure-collapse-all" class="btn btn-secondary">Tout refermer</button>
            <button id="add-pole-btn" class="btn btn-success">+ Ajouter un Pôle</button>
        </div>
    </div>

    <div class="structure-hint">
        Cliquez sur une ligne (ou ▶) pour dérouler un pôle ou une catégorie.
    </div>

    <div class="structure-container">
        <div id="structure-tree" class="structure-tree">
            <!-- L'arbre sera généré ici -->
        </div>
    </div>

    <!-- Modal pour ajouter/éditer une catégorie -->
    <div id="category-modal" class="modal" style="display: none;">
        <div class="modal-content">
            <h3>Ajouter une catégorie</h3>
            <form id="category-form">
                <div class="form-group">
                    <label for="cat-name">Nom de la catégorie *</label>
                    <input type="text" id="cat-name" required>
                </div>

                <div class="form-group">
                    <label for="cat-parent">Parent :</label>
                    <input type="hidden" id="cat-parent-id" value="">
                    <div id="cat-parent-display" class="parent-display">Racine (Pôle)</div>
                </div>

                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Créer</button>
                    <button type="button" class="btn btn-secondary" onclick="document.getElementById('category-modal').style.display='none'">Annuler</button>
                </div>
            </form>
        </div>
    </div>
</div>

<template id="tree-node-template">
    <div class="tree-node" data-node-id="{nodeId}">
        <div class="tree-node-content">
            <button class="expand-toggle" style="visibility: {expandVisibility}">▶</button>
            <span class="node-icon">{icon}</span>
            <span class="node-label">{nodeName}</span>
            <div class="node-actions">
                <button class="btn-action add-child-btn" title="Ajouter une sous-catégorie">➕</button>
                <button class="btn-action delete-node-btn" title="Supprimer">🗑️</button>
            </div>
        </div>
        <div class="tree-children" style="display: none;">
            <!-- Les enfants seront ajoutés ici -->
        </div>
    </div>
</template>

<style>
.structure-view {
    padding: 20px;
}

.view-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
    padding-bottom: 15px;
    border-bottom: 2px solid var(--border-color);
}

.view-header h2 {
    margin: 0;
}

.structure-actions {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
}

.structure-container {
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 20px;
}

.structure-hint {
    margin-bottom: 12px;
    color: var(--text-secondary);
    font-size: 0.9em;
}

.structure-tree {
    max-width: 100%;
}

.tree-node {
    margin-bottom: 5px;
}

.tree-node.root-node > .tree-node-content {
    background: var(--pole-bg, rgba(33, 150, 243, 0.08));
    border-left: 6px solid var(--pole-band, var(--accent-color));
}

.tree-node.root-node > .tree-node-content .node-label,
.tree-node.root-node > .tree-node-content .node-icon {
    color: var(--pole-text, var(--text-primary));
}

.tree-node-content {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 8px;
    border-radius: 4px;
    transition: background 0.2s;
    cursor: pointer;
}

.tree-node-content:hover {
    background: rgba(255, 255, 255, 0.08);
}

.expand-toggle {
    background: none;
    border: none;
    color: var(--text-secondary);
    cursor: pointer;
    font-size: 0.8em;
    padding: 0;
    min-width: 16px;
    text-align: center;
    transition: transform 0.3s;
}

.expand-toggle.open {
    transform: rotate(90deg);
}

.node-icon {
    font-size: 1.2em;
}

.node-label {
    flex: 1;
    font-weight: 500;
    color: var(--text-primary);
}

.node-actions {
    display: none;
    gap: 6px;
    align-items: center;
}

.tree-node-content:hover .node-actions {
    display: flex;
}

.btn-action {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 0.95em;
    padding: 4px 6px;
    transition: transform 0.2s;
}

.btn-action:hover {
    transform: scale(1.15);
}

.tree-children {
    padding-left: 20px;
}

/* Modal styles */
.modal {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    bottom: 0;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
}

.modal-content {
    background: var(--bg-secondary);
    border: 1px solid var(--border-color);
    border-radius: 8px;
    padding: 20px;
    max-width: 400px;
    width: 90%;
}

.modal-content h3 {
    margin: 0 0 15px 0;
    color: var(--text-primary);
}

.form-group {
    margin-bottom: 15px;
}

.form-group label {
    display: block;
    font-weight: 600;
    margin-bottom: 5px;
    color: var(--text-secondary);
    font-size: 0.9em;
}

.form-group input {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--border-color);
    border-radius: 4px;
    background: var(--bg-primary);
    color: var(--text-primary);
    box-sizing: border-box;
}

.parent-display {
    padding: 8px 12px;
    border: 1px solid var(--border-color);
    border-radius: 4px;
    background: var(--bg-primary);
    color: var(--text-secondary);
    font-size: 0.9em;
}

.form-actions {
    display: flex;
    gap: 10px;
    margin-top: 15px;
}

.form-actions .btn {
    flex: 1;
}
</style>
