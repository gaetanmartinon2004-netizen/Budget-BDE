<!-- Vue Transactions - Saisie et visualisation -->
<div id="transactions-view" class="view transactions-view">
    <div class="view-header">
        <h2>💰 Transactions</h2>
        <div class="transactions-header-actions">
            <label for="trans-display-mode">Affichage :</label>
            <select id="trans-display-mode">
                <option value="history">Historique</option>
                <option value="tree">Arborescence pôles/catégories</option>
            </select>
            <button id="trans-expand-all" class="btn btn-secondary">Tout dérouler</button>
            <button id="trans-collapse-all" class="btn btn-secondary">Tout refermer</button>
            <button id="open-justif-folder-btn" class="btn btn-secondary">Ouvrir dossier justificatifs</button>
            <button id="new-transaction-btn" class="btn btn-success">+ Nouvelle Transaction</button>
        </div>
    </div>

    <!-- Formulaire de saisie en popup -->
    <div id="transaction-form-container" class="modal" style="display: none;">
        <div class="modal-content transaction-modal-content" role="dialog" aria-modal="true" aria-labelledby="transaction-form-title">
            <div class="transaction-modal-header">
                <h3 id="transaction-form-title">Nouvelle Transaction</h3>
                <button type="button" id="close-transaction-modal-btn" class="btn-action transaction-modal-close" title="Fermer">✕</button>
            </div>

            <form id="transaction-form" class="transaction-form">
            
            <div class="form-group">
                <label for="trans-label">Libellé *</label>
                <input type="text" id="trans-label" required>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="trans-amount">Montant (€) *</label>
                    <input type="number" id="trans-amount" step="0.01" required>
                </div>
                <div class="form-group">
                    <label for="trans-type">Type *</label>
                    <select id="trans-type" required>
                        <option value="">-- Sélectionner --</option>
                        <option value="expense">Dépense</option>
                        <option value="income">Revenu</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="trans-date">Date *</label>
                    <input type="date" id="trans-date" required>
                </div>
            </div>

            <div class="form-group">
                <label for="trans-category">Catégorie *</label>
                <div class="category-select-container">
                    <div id="trans-category-tree" class="category-select-tree">
                        <select id="trans-node-id" required>
                            <option value="">-- Sélectionner une catégorie --</option>
                        </select>
                    </div>
                    <div id="trans-category-preview" class="category-preview">Aucune catégorie sélectionnée</div>
                </div>
            </div>

            <div class="form-group">
                <label for="trans-attachments">Justificatifs</label>
                <input type="file" id="trans-attachments" multiple accept=".pdf,.png,.jpg,.jpeg,.webp,.doc,.docx,.xls,.xlsx">
                <div id="trans-existing-attachments" class="transaction-existing-attachments">
                    <span class="transaction-empty">Aucun justificatif existant</span>
                </div>
                <div class="field-help">Vous pouvez joindre plusieurs fichiers à la transaction.</div>
            </div>

            <div class="form-group">
                <label for="trans-payment">Moyen de paiement *</label>
                <select id="trans-payment" required>
                    <option value="">-- Sélectionner --</option>
                    <option value="virement">Virement</option>
                    <option value="cheque">Chèque</option>
                    <option value="especes">Espèces</option>
                    <option value="carte">Carte bancaire</option>
                </select>
            </div>

            <div class="form-group">
                <label for="trans-order-number">Ordre (à qui ça a été payé) *</label>
                <input type="text" id="trans-order-number" placeholder="Ex. Metro, Builders, Crédit Mutuel" required>
            </div>

            <div class="form-group">
                <label for="trans-description">Description</label>
                <textarea id="trans-description" rows="3"></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Enregistrer</button>
                <button type="button" id="cancel-form-btn" class="btn btn-secondary">Annuler</button>
            </div>
            </form>
        </div>
    </div>

    <!-- Filtres de recherche -->
    <div class="filters">
        <input type="text" id="trans-search" placeholder="🔍 Rechercher..." class="search-input">
        <select id="trans-filter-type">
            <option value="">Tous les types</option>
            <option value="income">Revenus</option>
            <option value="expense">Dépenses</option>
        </select>
        <select id="trans-filter-category">
            <option value="">Toutes les catégories</option>
        </select>
        <input type="month" id="trans-filter-month">
    </div>

    <!-- Tableau des transactions -->
    <div id="transactions-list" class="transactions-list">
        <!-- Les transactions seront listées ici -->
    </div>
</div>

<template id="transaction-row-template">
    <div class="transaction-row" data-transaction-id="{transId}">
        <div class="transaction-date">{date}</div>
        <div class="transaction-label" data-field="label">{label}</div>
        <div class="transaction-category">{category}</div>
        <div class="transaction-type {typeClass}">{type}</div>
        <div class="transaction-amount {typeClass}">{amount} €</div>
        <div class="transaction-order">{order}</div>
        <div class="transaction-actions">
            <button class="btn-action delete-btn" title="Supprimer">✖</button>
        </div>
    </div>
</template>
